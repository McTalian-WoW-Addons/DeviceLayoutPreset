name: Main

on:
  push:
    branches:
      - main
      - ([0-9]+)?(.{([0-9]+),x}).x # 1.x, 1.2.x, 1.x.x

permissions: {}

jobs:
  ci:
    permissions:
      contents: write
      actions: write
      pull-requests: write
      issues: write
    uses: McTalian-WoW-Addons/wow-build-tools/.github/workflows/ci.yml@v1-beta
    with:
      addon-name: DeviceLayoutPreset
      rockspec-name: devicelayoutpreset-1-1.rockspec
      i18n-enabled: true
    secrets: inherit
